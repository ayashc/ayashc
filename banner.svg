<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.9" fill="#48cae4" opacity="0.18"/>
    </pattern>
    <radialGradient id="nb1" cx="20%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#1a6fcf" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#040e1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb2" cx="82%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#006e80" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#040e1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb3" cx="54%" cy="95%" r="38%">
      <stop offset="0%" stop-color="#0352a0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#040e1c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vg" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="#040e1c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0.85"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes pulse1{0%,100%{opacity:.6}50%{opacity:.9}}
    @keyframes pulse2{0%,100%{opacity:.45}50%{opacity:.75}}
    @keyframes tw{0%,100%{opacity:.08}50%{opacity:.95}}
    @keyframes sweep{0%{transform:translateX(-4px)}100%{transform:translateX(1204px)}}
    @keyframes wavemove{0%{transform:translateX(0)}100%{transform:translateX(-200px)}}
  </style>

  <rect width="1200" height="400" fill="#040e1c"/>

  <ellipse cx="240" cy="210" rx="380" ry="260" fill="url(#nb1)" style="animation:pulse1 9s ease-in-out infinite"/>
  <ellipse cx="980" cy="145" rx="320" ry="230" fill="url(#nb2)" style="animation:pulse2 11s ease-in-out infinite 2s"/>
  <ellipse cx="640" cy="390" rx="340" ry="210" fill="url(#nb3)" style="animation:pulse1 8s ease-in-out infinite 4s"/>

  <rect width="1200" height="400" fill="url(#dots)"/>

  <circle cx="78"   cy="38"  r="1"   fill="#caf0f8" style="animation:tw 4.1s ease-in-out infinite 0s"/>
  <circle cx="188"  cy="112" r="1.5" fill="#90e0ef" style="animation:tw 5.3s ease-in-out infinite 0.7s"/>
  <circle cx="325"  cy="68"  r="1"   fill="#48cae4" style="animation:tw 6.2s ease-in-out infinite 1.3s"/>
  <circle cx="415"  cy="295" r="1.5" fill="#caf0f8" style="animation:tw 4.8s ease-in-out infinite 2s"/>
  <circle cx="505"  cy="148" r="1"   fill="#00b4d8" style="animation:tw 7.1s ease-in-out infinite 0.4s"/>
  <circle cx="598"  cy="58"  r="2"   fill="#90e0ef" style="animation:tw 5.6s ease-in-out infinite 1.9s"/>
  <circle cx="675"  cy="225" r="1"   fill="#48cae4" style="animation:tw 4.3s ease-in-out infinite 3.1s"/>
  <circle cx="758"  cy="348" r="1.5" fill="#caf0f8" style="animation:tw 6.7s ease-in-out infinite 0.6s"/>
  <circle cx="848"  cy="108" r="1"   fill="#00b4d8" style="animation:tw 5.2s ease-in-out infinite 2.6s"/>
  <circle cx="938"  cy="262" r="1.5" fill="#90e0ef" style="animation:tw 7.6s ease-in-out infinite 1.1s"/>
  <circle cx="1018" cy="52"  r="1"   fill="#48cae4" style="animation:tw 4.6s ease-in-out infinite 1.8s"/>
  <circle cx="1098" cy="178" r="2"   fill="#caf0f8" style="animation:tw 6.1s ease-in-out infinite 1s"/>
  <circle cx="1158" cy="318" r="1"   fill="#00b4d8" style="animation:tw 5.7s ease-in-out infinite 2.4s"/>
  <circle cx="138"  cy="332" r="1.5" fill="#90e0ef" style="animation:tw 8.2s ease-in-out infinite 0.3s"/>
  <circle cx="268"  cy="198" r="1"   fill="#48cae4" style="animation:tw 4.4s ease-in-out infinite 3s"/>
  <circle cx="52"   cy="238" r="1"   fill="#caf0f8" style="animation:tw 6.9s ease-in-out infinite 1.5s"/>
  <circle cx="378"  cy="378" r="1.5" fill="#00b4d8" style="animation:tw 5.4s ease-in-out infinite 2.9s"/>
  <circle cx="478"  cy="28"  r="1"   fill="#90e0ef" style="animation:tw 7.3s ease-in-out infinite 0.2s"/>
  <circle cx="718"  cy="312" r="1"   fill="#48cae4" style="animation:tw 4.9s ease-in-out infinite 1.7s"/>
  <circle cx="808"  cy="42"  r="1.5" fill="#caf0f8" style="animation:tw 5.9s ease-in-out infinite 2.2s"/>
  <circle cx="1068" cy="382" r="1"   fill="#00b4d8" style="animation:tw 6.4s ease-in-out infinite 0.9s"/>
  <circle cx="568"  cy="388" r="2"   fill="#90e0ef" style="animation:tw 4.7s ease-in-out infinite 3.6s"/>
  <circle cx="898"  cy="388" r="1"   fill="#48cae4" style="animation:tw 7.9s ease-in-out infinite 1.4s"/>
  <circle cx="1148" cy="88"  r="1.5" fill="#caf0f8" style="animation:tw 5.5s ease-in-out infinite 2.8s"/>
  <circle cx="28"   cy="142" r="1"   fill="#00b4d8" style="animation:tw 6.8s ease-in-out infinite 0.5s"/>
  <circle cx="450"  cy="185" r="1"   fill="#90e0ef" style="animation:tw 5.1s ease-in-out infinite 4s"/>
  <circle cx="1180" cy="200" r="1.5" fill="#48cae4" style="animation:tw 8.5s ease-in-out infinite 0.8s"/>
  <circle cx="310"  cy="360" r="1"   fill="#caf0f8" style="animation:tw 4s ease-in-out infinite 2.3s"/>

  <g style="animation:wavemove 18s linear infinite">
    <path d="M-200 200 Q0 155 200 200 T600 200 T1000 200 T1400 200" stroke="#48cae4" stroke-width="0.5" fill="none" opacity="0.13"/>
    <path d="M-200 240 Q100 165 300 240 T700 230 T1100 240 T1400 230" stroke="#0096c7" stroke-width="0.35" fill="none" opacity="0.09"/>
    <path d="M-200 170 Q150 130 350 170 T750 165 T1150 170 T1400 160" stroke="#48cae4" stroke-width="0.3" fill="none" opacity="0.07"/>
  </g>

  <g style="animation:sweep 22s linear infinite">
    <rect y="0" width="2" height="400" fill="#00b4d8" opacity="0.22" rx="1"/>
    <rect y="0" width="8" height="400" fill="#00b4d8" opacity="0.05" rx="2"/>
  </g>

  <rect width="1200" height="400" fill="url(#vg)"/>
</svg>
