<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 65" width="620" height="65">

  <!-- Title text with fade-in -->
  <text x="310" y="32" text-anchor="middle" 
        font-family="'Courier New', monospace" 
        font-size="26" font-weight="700" 
        fill="#D2B99B" letter-spacing="3" opacity="0">WELCOME TO MY REALITY
    <animate attributeName="opacity" from="0" to="1" dur="2s" begin="0.5s" fill="freeze" />
  </text>

  <!-- Accent line growing from center -->
  <line x1="310" y1="50" x2="310" y2="50" 
        stroke="#B6A496" stroke-width="0.8">
    <animate attributeName="x1" from="310" to="195" dur="1s" begin="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
    <animate attributeName="x2" from="310" to="425" dur="1s" begin="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
  </line>

  <!-- Dots at ends -->
  <circle cx="195" cy="50" r="1.5" fill="#B6A496" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.5s" fill="freeze" />
  </circle>
  <circle cx="425" cy="50" r="1.5" fill="#B6A496" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="3.5s" fill="freeze" />
  </circle>

</svg>
